<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>API Balance</title><style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding:24px;background:#0b1020;color:#fff}.card{max-width:520px;margin:0 auto;padding:24px;border-radius:24px;background:linear-gradient(180deg,#16203a,#0f172a);box-shadow:0 10px 30px rgba(0,0,0,.35)}.muted{color:#9fb0d0}.value{font-size:56px;font-weight:700;margin:10px 0}.row{margin-top:8px}</style></head><body><div class="card"><div class="muted">API Balance</div><div class="value" id="balance">--</div><div class="row muted" id="detail">Loading...</div><div class="row muted" id="updated"></div></div><script>fetch('./balance.json?_=' + Date.now()).then(r=>r.json()).then(data=>{document.getElementById('balance').textContent=data.display_balance||'--';document.getElementById('detail').textContent=data.display_detail||'';document.getElementById('updated').textContent='Updated '+(data.updated_at||'');}).catch(()=>{document.getElementById('detail').textContent='Failed to load';});</script></body></html>
